<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo · Gudyx Custom</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="imagens/mascote.png" alt="Mascote" class="mascote">
            <h1>GUDYX <span>CUSTOM</span></h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="servicos.html">Serviços</a></li>
                <li><a href="catalogo.html" class="ativo">Catálogo</a></li>
                <li><a href="quem-somos.html">Quem Somos</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Nosso Catálogo</h2>
        <p>Escolha uma categoria para ver os produtos:</p>
        <div class="categorias-grid" id="categoriasProdutos"></div>
    </main>

    <footer>
        <p>&copy; 2026 Gudyx Custom</p>
    </footer>

    <script src="js/dados.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('categoriasProdutos');
            if (siteData.catalogo && siteData.catalogo.categorias) {
                container.innerHTML = siteData.catalogo.categorias.map(cat => `
                    <a href="categoria.html?tipo=produto&cat=${encodeURIComponent(cat.nome.toLowerCase())}" class="categoria-card">
                        <img src="${cat.imagem || 'imagens/placeholder.png'}" alt="${cat.nome}">
                        <h3>${cat.nome}</h3>
                    </a>
                `).join('');
            }
        });
    </script>
</body>
</html>
