<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quem Somos · Gudyx Custom</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="imagens/mascote.png" alt="Mascote" class="mascote">
            <h1>GUDYX <span>CUSTOM</span></h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="servicos.html">Serviços</a></li>
                <li><a href="catalogo.html">Catálogo</a></li>
                <li><a href="quem-somos.html" class="ativo">Quem Somos</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main class="pagina-texto">
        <h2 id="quemSomosTitulo">Nossa História</h2>
        <div id="quemSomosConteudo">
            <p>A Gudyx Custom nasceu do amor pelo papel, pela criatividade e pela organização.</p>
        </div>
        <img id="quemSomosImagem" src="imagens/loja.jpg" alt="Nossa loja" style="max-width:100%; border-radius:12px; margin-top:20px;">
    </main>

    <footer>
        <p>&copy; 2026 Gudyx Custom</p>
    </footer>

    <script src="js/dados.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof siteData !== 'undefined') {
                document.getElementById('quemSomosTitulo').textContent = siteData.quemSomosTitulo || 'Nossa História';
                document.getElementById('quemSomosConteudo').innerHTML = siteData.quemSomosTexto || '<p>Texto sobre a empresa.</p>';
                const img = document.getElementById('quemSomosImagem');
                if (siteData.quemSomosImagem) img.src = siteData.quemSomosImagem;
            }
        });
    </script>
</body>
</html>
