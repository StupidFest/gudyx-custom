<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categoria · Gudyx Custom</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="imagens/mascote.png" alt="Mascote" class="mascote">
            <h1>GUDYX <span>CUSTOM</span></h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="servicos.html">Serviços</a></li>
                <li><a href="catalogo.html">Catálogo</a></li>
                <li><a href="quem-somos.html">Quem Somos</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2 id="categoriaTitulo">Carregando...</h2>
        <div class="cards-grid" id="itensContainer"></div>
        <p id="mensagemVazia" style="display:none;">Nenhum item encontrado nesta categoria.</p>
    </main>

    <footer>
        <p>&copy; 2026 Gudyx Custom</p>
    </footer>

    <script src="js/dados.js"></script>
    <script src="js/script.js"></script>
    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const tipo = params.get('tipo');
            const catNome = params.get('cat');

            if (!tipo || !catNome) {
                document.getElementById('categoriaTitulo').textContent = 'Categoria não encontrada';
                return;
            }

            let categorias = [];
            if (tipo === 'produto' && siteData.catalogo) {
                categorias = siteData.catalogo.categorias;
            } else if (tipo === 'servico' && siteData.servicos) {
                categorias = siteData.servicos.categorias;
            }

            const categoria = categorias.find(c => c.nome.toLowerCase() === catNome);
            if (!categoria) {
                document.getElementById('categoriaTitulo').textContent = 'Categoria não encontrada';
                return;
            }

            document.getElementById('categoriaTitulo').textContent = categoria.nome;
            const container = document.getElementById('itensContainer');
            if (categoria.itens && categoria.itens.length > 0) {
                renderCards('itensContainer', categoria.itens);
            } else {
                document.getElementById('mensagemVazia').style.display = 'block';
            }
        })();
    </script>
</body>
</html>
